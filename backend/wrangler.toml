name = "whoop-e2ee-sync"
main = "src/index.ts"
compatibility_date = "2024-09-01"

# D1: stores the encrypted Envelope JSON (ciphertext) + metadata. (R2 is the scale path for $0 egress — enable it
# in the dashboard, add an [[r2_buckets]] binding, and switch the Worker's getBlob/putBlob to R2.)
[[d1_databases]]
binding = "DB"
database_name = "whoop-e2ee-meta"
database_id = "<YOUR_D1_DATABASE_ID>"

# The OAuth audiences to require (set via `wrangler secret put` or vars). Replace with your real ids.
[vars]
APPLE_AUD = "com.example.yourapp"
# Comma-separated allow-list. Replace with your Google OAuth client ids before deploying.
GOOGLE_AUD = "<YOUR_GOOGLE_CLIENT_IDS>"
